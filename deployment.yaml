apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-gym
  template:
    metadata:
      labels:
        app: aceest-gym
    spec:
      containers:
      - name: aceest-gym
        image: jatin2412/aceest-gym-app:v2
        ports:
        - containerPort: 5000